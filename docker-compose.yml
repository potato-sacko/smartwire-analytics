version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - FASTAPI_ENV=production
      - FASTAPI_DEBUG=False
      - CORS_ORIGINS=http://localhost:3000
    volumes:
      - ./backend/app:/app/app
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - smartwire

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - smartwire

networks:
  smartwire:
    driver: bridge

volumes:
  uploads:
